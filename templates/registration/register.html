{% extends 'base.html' %}

{% block title %}用户注册 - Money Journey{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="card">
        <div class="card-body">
            <div class="text-center mb-4">
                <div class="avatar-circle bg-primary bg-opacity-10 text-primary mx-auto mb-3" style="width:56px;height:56px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-plus"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
                </div>
                <h2>创建账户</h2>
                <p class="text-muted">注册一个新的 Money Journey 账户</p>
            </div>

            <form method="post" action="{% url 'accounts:register' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">用户名</label>
                    <input type="text" name="username" id="id_username" class="form-control" required autofocus placeholder="请输入用户名">
                </div>
                <div class="mb-3">
                    <label for="id_first_name" class="form-label">姓名</label>
                    <input type="text" name="first_name" id="id_first_name" class="form-control" required placeholder="请输入您的姓名">
                </div>
                <div class="mb-3">
                    <label for="id_email" class="form-label">邮箱地址 <span class="text-muted">(可选)</span></label>
                    <input type="email" name="email" id="id_email" class="form-control" placeholder="用于接收通知">
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">密码</label>
                    <input type="password" name="password" id="id_password" class="form-control" required placeholder="至少6位字符">
                </div>
                <div class="mb-4">
                    <label for="id_password2" class="form-label">确认密码</label>
                    <input type="password" name="password2" id="id_password2" class="form-control" required placeholder="请再次输入密码">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-plus me-1"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
                        注册
                    </button>
                </div>
                <div class="text-center mt-3">
                    <p class="text-muted small mb-1">注册后需要管理员批准才能登录使用系统</p>
                    <p class="mb-0">已有账户？<a href="{% url 'accounts:login' %}" class="text-decoration-none">立即登录</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
